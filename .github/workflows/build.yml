name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # Publish self-contained x64 binary
      - name: Publish (self-contained x64)
        shell: powershell
        run: |
          dotnet publish "SaveBridge\SaveBridge\SaveBridge.csproj" `
            -c Release `
            -r win10-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o "publish\SaveBridge"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Publish output:"
          Get-ChildItem "publish\SaveBridge" | Select-Object Name,Length | Format-Table

      # Assemble the APPX layout folder
      - name: Assemble APPX layout
        shell: powershell
        run: |
          $layout = "appx_layout"
          New-Item -ItemType Directory -Force -Path $layout | Out-Null

          # Copy all published binaries
          Copy-Item "publish\SaveBridge\*" $layout -Recurse -Force

          # Copy Package.appxmanifest (repo root -> SaveBridge\SaveBridge\Package.appxmanifest)
          Copy-Item "SaveBridge\SaveBridge\Package.appxmanifest" "$layout\AppxManifest.xml" -Force

          # Copy assets (must be in Assets\ subfolder matching manifest)
          New-Item -ItemType Directory -Force -Path "$layout\Assets" | Out-Null
          Copy-Item "SaveBridge\SaveBridge\Assets\*" "$layout\Assets\" -Force

          Write-Host "APPX layout (top-level):"
          Get-ChildItem $layout | Select-Object Name,Length | Format-Table
          Write-Host "Assets:"
          Get-ChildItem "$layout\Assets" | Select-Object Name | Format-Table

      # Create self-signed cert (CN=Adoptsomekids matches Package.appxmanifest Publisher)
      - name: Create signing certificate
        id: cert
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          # Export .cer for Xbox installation
          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          # Export .pfx for signing
          $pfxPath = "$env:GITHUB_WORKSPACE\SaveBridge-Dev.pfx"
          $pwd = ConvertTo-SecureString -String "SaveBridgeDev" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          Write-Host "Cert thumbprint: $($cert.Thumbprint)"
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "cer_path=$cerPath"               >> $env:GITHUB_OUTPUT
          echo "pfx_path=$pfxPath"               >> $env:GITHUB_OUTPUT

      # Pack the APPX using MakeAppx.exe
      - name: Pack APPX
        id: pack
        shell: powershell
        run: |
          # Locate MakeAppx.exe from Windows SDK
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "makeappx.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeappx) {
            Write-Error "MakeAppx.exe not found"
            exit 1
          }
          Write-Host "MakeAppx: $makeappx"

          $appxPath = "$env:GITHUB_WORKSPACE\SaveBridge_1.0.0.0_x64.appx"

          & $makeappx pack /d "appx_layout" /p "$appxPath" /overwrite /nv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "APPX created: $appxPath ($($(Get-Item $appxPath).Length) bytes)"
          echo "appx_path=$appxPath" >> $env:GITHUB_OUTPUT

      # Sign with the dev cert
      - name: Sign APPX
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          Write-Host "signtool: $signtool"

          & $signtool sign /fd SHA256 /sha1 "${{ steps.cert.outputs.thumbprint }}" `
            "${{ steps.pack.outputs.appx_path }}"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "signtool failed with $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Signed OK"

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.pack.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pack.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
