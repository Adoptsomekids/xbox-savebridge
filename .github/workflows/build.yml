name: Build APPX (Legacy UAP)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MSBuild is required for legacy UAP projects (ToolsVersion=15.0, WindowsXaml targets)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # NuGet restore — legacy UAP uses packages.config-style PackageReference restore
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet Restore
        shell: powershell
        run: |
          nuget restore "SaveBridge\SaveBridge.sln" -Verbosity quiet
          if ($LASTEXITCODE -ne 0) {
            Write-Host "nuget restore failed, trying msbuild /t:Restore..."
            msbuild "SaveBridge\SaveBridge\SaveBridge.csproj" /t:Restore /p:Configuration=Release /p:Platform=x64 /v:minimal
          }

      # Build with MSBuild targeting Release|x64
      # GenerateAppxPackageOnBuild=true tells the UAP targets to produce the APPX layout + pack
      - name: Build with MSBuild
        shell: powershell
        run: |
          msbuild "SaveBridge\SaveBridge\SaveBridge.csproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxPackageSigningEnabled=false `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /v:minimal `
            /m

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Show everything produced
          Write-Host "=== All .appx files produced ==="
          Get-ChildItem "SaveBridge\SaveBridge" -Recurse -Filter "*.appx" | Select-Object FullName,Length | Format-Table
          Write-Host "=== AppPackages layout ==="
          if (Test-Path "SaveBridge\SaveBridge\AppPackages") {
            Get-ChildItem "SaveBridge\SaveBridge\AppPackages" -Recurse | Select-Object FullName,Length | Format-Table
          }
          Write-Host "=== All XML/manifest files ==="
          Get-ChildItem "SaveBridge\SaveBridge\AppPackages" -Recurse -Filter "*.xml" | Select-Object FullName | Format-Table
          Get-ChildItem "SaveBridge\SaveBridge\AppPackages" -Recurse -Filter "AppxManifest*" | Select-Object FullName | Format-Table

      # Write pack script to disk to avoid YAML/PS brace parsing issues
      - name: Write pack script
        shell: powershell
        run: |
          $script = @'
          $ErrorActionPreference = "Stop"
          $makeappx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1).FullName
          if (-not $makeappx) { throw "MakeAppx.exe not found" }
          Write-Host "MakeAppx: $makeappx"
          $appxPath = "$env:GITHUB_WORKSPACE\SaveBridge_1.0.0.0_x64.appx"
          $prebuilt = Get-ChildItem "SaveBridge\SaveBridge" -Recurse -Filter "SaveBridge*.appx" -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -notlike "*\Dependencies\*" } | Select-Object -First 1
          if ($prebuilt) {
            Write-Host "Pre-built APPX: $($prebuilt.FullName)"
            Copy-Item $prebuilt.FullName $appxPath -Force
          } else {
            Write-Host "No pre-built APPX, assembling layout..."
            $layoutDir = "$env:GITHUB_WORKSPACE\appx_layout"
            New-Item -ItemType Directory -Force -Path $layoutDir | Out-Null
            $testDir = (Get-ChildItem "SaveBridge\SaveBridge\AppPackages" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "SaveBridge*" } | Select-Object -First 1).FullName
            if ($testDir) {
              Write-Host "Copying from AppPackages layout: $testDir"
              Copy-Item "$testDir\*" $layoutDir -Recurse -Force
            } else {
              Write-Host "Copying from bin output..."
              Copy-Item "SaveBridge\SaveBridge\bin\x64\Release\*" $layoutDir -Recurse -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path "$layoutDir\Assets" | Out-Null
              Copy-Item "SaveBridge\SaveBridge\Assets\*" "$layoutDir\Assets\" -Force
            }
            $m = (Get-Content "SaveBridge\SaveBridge\Package.appxmanifest" -Raw) -replace '\$targetnametoken\$','SaveBridge'
            Set-Content "$layoutDir\AppxManifest.xml" $m -Encoding UTF8
            Write-Host "Layout contents (top-level):"
            Get-ChildItem $layoutDir | Select-Object Name | Format-Table
            Write-Host "Packing: $layoutDir"
            & $makeappx pack /d "$layoutDir" /p "$appxPath" /overwrite /nv
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          Write-Host "Done: $appxPath ($((Get-Item $appxPath).Length) bytes)"
          "appx_path=$appxPath" | Out-File $env:GITHUB_OUTPUT -Append
          '@
          $script | Set-Content "$env:GITHUB_WORKSPACE\pack-appx.ps1" -Encoding UTF8

      - name: Pack and Locate APPX
        id: locate
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\pack-appx.ps1"

      # Create self-signed cert (CN=Adoptsomekids matches Publisher in manifest)
      - name: Create signing certificate
        id: cert
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          $pfxPath = "$env:GITHUB_WORKSPACE\SaveBridge-Dev.pfx"
          $pwd = ConvertTo-SecureString -String "SaveBridgeDev" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          Write-Host "Cert thumbprint: $($cert.Thumbprint)"
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "cer_path=$cerPath"               >> $env:GITHUB_OUTPUT

      - name: Sign APPX
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          Write-Host "signtool: $signtool"
          Write-Host "APPX: ${{ steps.locate.outputs.appx_path }}"

          & $signtool sign /fd SHA256 /sha1 "${{ steps.cert.outputs.thumbprint }}" `
            "${{ steps.locate.outputs.appx_path }}"

          if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed"; exit $LASTEXITCODE }
          Write-Host "Signed OK"

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.locate.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
