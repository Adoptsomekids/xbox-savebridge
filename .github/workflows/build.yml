name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      # Install Universal Windows Platform workload so that Windows SDK,
      # Windows.winmd, BCL facades, and XAML targets are all present.
      - name: Install UWP workload
        shell: powershell
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstaller) {
            Write-Host "Installing UWP workload..."
            & $vsInstaller modify `
              --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
              --add Microsoft.VisualStudio.Workload.Universal `
              --quiet --norestart --force 2>&1
            Write-Host "UWP workload install exit code: $LASTEXITCODE"
          } else {
            Write-Host "VS Installer not found, assuming workload already present."
          }

      # Diagnostic: show SDK layout and XAML targets.
      - name: Probe SDK and XAML targets
        shell: powershell
        run: |
          $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          Write-Host "=== UnionMetadata versions ==="
          Get-ChildItem "$kitsRoot\UnionMetadata" -EA SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "=== References versions ==="
          Get-ChildItem "$kitsRoot\References" -EA SilentlyContinue | Where-Object { $_.PSIsContainer } | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "=== XAML CSharp.targets ==="
          $vs = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          Get-ChildItem "$vs\MSBuild\Microsoft\WindowsXaml" -Recurse -Filter "Microsoft.Windows.UI.Xaml.CSharp.targets" -EA SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }

      # NuGet restore pulls Microsoft.NETCore.UniversalWindowsPlatform 6.2.9
      # which ships System.Runtime.dll and all other BCL facade DLLs.
      # These are required by the XAML type-universe checker (WMC pass).
      - name: NuGet Restore
        shell: powershell
        run: |
          nuget restore "SaveBridge\SaveBridge.sln" -Verbosity normal
          Write-Host "NuGet restore exit code: $LASTEXITCODE"

      # Verify NUP was restored and contains the BCL facades.
      - name: Verify NUP restore
        shell: powershell
        run: |
          $nupDir = "$env:GITHUB_WORKSPACE\packages\Microsoft.NETCore.UniversalWindowsPlatform.6.2.9"
          Write-Host "NUP dir exists: $(Test-Path $nupDir)"
          $props = "$nupDir\build\Microsoft.NETCore.UniversalWindowsPlatform.props"
          Write-Host "NUP props exists: $(Test-Path $props)"
          $rtDir = "$nupDir\lib\uap10.0"
          if (Test-Path $rtDir) {
            Write-Host "NUP lib\uap10.0 contents:"
            Get-ChildItem $rtDir -Filter "System.Runtime*" | ForEach-Object { Write-Host "  $($_.Name)" }
          }
          $refDir = "$nupDir\ref\uap10.0.15138"
          if (Test-Path $refDir) {
            Write-Host "NUP ref\uap10.0.15138 System.Runtime* files:"
            Get-ChildItem $refDir -Filter "System.Runtime*" | ForEach-Object { Write-Host "  $($_.Name)" }
          }

      - name: Build APPX (ARM64)
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find MSBuild\**\Bin\MSBuild.exe
          if (-not $msbuild) { $msbuild = "msbuild" }
          Write-Host "Using MSBuild: $msbuild"

          & $msbuild "SaveBridge\SaveBridge.sln" `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="ARM64" `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=false `
            /t:Build `
            /m `
            /v:normal

          Write-Host "Build exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

      - name: Find APPX output
        if: success()
        shell: powershell
        id: find_appx
        run: |
          $appx = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1
          if (-not $appx) { $appx = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1 }
          if ($appx) {
            Write-Host "Found: $($appx.FullName)"
            echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            echo "appx_name=$($appx.Name)"     >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No bundle found. Available outputs:"
            Get-ChildItem -Recurse -Include "*.appx","*.appxbundle","*.msix","*.msixbundle"
          }

      - name: Upload APPX artifact
        if: success() && steps.find_appx.outputs.appx_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: ${{ steps.find_appx.outputs.appx_path }}
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release' && steps.find_appx.outputs.appx_path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_appx.outputs.appx_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
