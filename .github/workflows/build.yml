name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Install Universal Windows Platform workload.
      # This ensures Windows.winmd, BCL facades, and XamlCompiler targets are present.
      - name: Install UWP workload
        shell: powershell
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstaller) {
            Write-Host "Installing UWP workload..."
            & $vsInstaller modify `
              --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
              --add Microsoft.VisualStudio.Workload.Universal `
              --quiet --norestart --force 2>&1
            Write-Host "UWP workload install exit code: $LASTEXITCODE"
          } else {
            Write-Host "VS Installer not found, assuming workload already present."
          }

      # Diagnostic: show SDK layout and XAML targets location.
      - name: Probe SDK and XAML targets
        shell: powershell
        run: |
          $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          Write-Host "=== Windows SDK UnionMetadata versions ==="
          Get-ChildItem "$kitsRoot\UnionMetadata" -EA SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "=== Windows SDK References versions ==="
          Get-ChildItem "$kitsRoot\References" -EA SilentlyContinue | Where-Object { $_.PSIsContainer } | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "=== XAML targets locations ==="
          $vs = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          Get-ChildItem "$vs\MSBuild\Microsoft\WindowsXaml" -Recurse -Filter "*.targets" -EA SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host "=== System.Runtime in SDK refs ==="
          $rtPath = "$kitsRoot\References\10.0.19041.0\System.Runtime\10.0.19041.0\System.Runtime.dll"
          Write-Host "  10.0.19041.0: $(Test-Path $rtPath)"

      - name: Restore NuGet packages
        shell: powershell
        run: |
          $nuget = "${env:ProgramFiles(x86)}\NuGet\nuget.exe"
          if (-not (Test-Path $nuget)) { $nuget = "nuget" }
          & $nuget restore "SaveBridge\SaveBridge.sln" -Verbosity quiet
          Write-Host "NuGet restore: $LASTEXITCODE"

      - name: Build APPX (ARM64)
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find MSBuild\**\Bin\MSBuild.exe
          if (-not $msbuild) { $msbuild = "msbuild" }
          Write-Host "Using MSBuild: $msbuild"

          & $msbuild "SaveBridge\SaveBridge.sln" `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="ARM64" `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=false `
            /t:Build `
            /m `
            /v:normal

          Write-Host "Build exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

      - name: Find APPX output
        if: success()
        shell: powershell
        id: find_appx
        run: |
          $appx = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1
          if (-not $appx) { $appx = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1 }
          if ($appx) {
            Write-Host "Found: $($appx.FullName)"
            echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            echo "appx_name=$($appx.Name)"     >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No bundle found. Available outputs:"
            Get-ChildItem -Recurse -Include "*.appx","*.appxbundle","*.msix","*.msixbundle"
          }

      - name: Upload APPX artifact
        if: success() && steps.find_appx.outputs.appx_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: ${{ steps.find_appx.outputs.appx_path }}
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release' && steps.find_appx.outputs.appx_path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_appx.outputs.appx_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
