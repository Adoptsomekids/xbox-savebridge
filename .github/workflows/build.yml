name: Build APPX (Legacy UAP)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MSBuild is required for legacy UAP projects (ToolsVersion=15.0, WindowsXaml targets)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # NuGet restore — legacy UAP uses packages.config-style PackageReference restore
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet Restore
        shell: powershell
        run: |
          nuget restore "SaveBridge\SaveBridge.sln" -Verbosity quiet
          if ($LASTEXITCODE -ne 0) {
            Write-Host "nuget restore failed, trying msbuild /t:Restore..."
            msbuild "SaveBridge\SaveBridge\SaveBridge.csproj" /t:Restore /p:Configuration=Release /p:Platform=x64 /v:minimal
          }

      # Build with MSBuild targeting Release|x64
      # GenerateAppxPackageOnBuild=true tells the UAP targets to produce the APPX layout
      - name: Build with MSBuild
        shell: powershell
        run: |
          msbuild "SaveBridge\SaveBridge\SaveBridge.csproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxPackageSigningEnabled=false `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /v:minimal `
            /m

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Show what was produced
          Write-Host "Build output:"
          Get-ChildItem "SaveBridge\SaveBridge\bin\x64\Release" -Recurse -Filter "*.appx" |
            Select-Object FullName,Length | Format-Table

      # The MSBuild UAP targets put the main APPX in AppPackages\SaveBridge_*_Test\
      - name: Locate APPX
        id: locate
        shell: powershell
        run: |
          Write-Host "Searching for main APPX (SaveBridge*.appx, not dependencies)..."

          # Look for the main package file (not dependency frameworks)
          # The main package is named SaveBridge_<version>_<arch>[_Test].appx
          $appxSearchDirs = @(
            "SaveBridge\SaveBridge\AppPackages",
            "SaveBridge\SaveBridge\bin\x64\Release\AppPackages",
            "SaveBridge\SaveBridge\bin\x64\Release"
          )

          $appx = $null
          foreach ($dir in $appxSearchDirs) {
            if (Test-Path $dir) {
              Write-Host "Checking $dir ..."
              Get-ChildItem $dir -Recurse -Filter "SaveBridge*.appx" | ForEach-Object {
                Write-Host "  Candidate: $($_.FullName)"
              }
              # Exclude files inside a Dependencies sub-folder
              $appx = Get-ChildItem $dir -Recurse -Filter "SaveBridge*.appx" |
                Where-Object { $_.DirectoryName -notlike "*\Dependencies\*" } |
                Select-Object -First 1
              if ($appx) {
                Write-Host "Selected: $($appx.FullName)"
                break
              }
            }
          }

          if (-not $appx) {
            Write-Host "Main APPX not found in AppPackages, building manually with MakeAppx..."
            $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "makeappx.exe" |
              Where-Object { $_.FullName -like "*x64*" } |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $makeappx) { Write-Error "MakeAppx.exe not found"; exit 1 }

            # Find the APPX staging layout that MSBuild created
            $appxLayoutDir = Get-ChildItem "SaveBridge\SaveBridge\AppPackages" -Directory |
              Where-Object { $_.Name -like "SaveBridge*" } |
              Select-Object -First 1 -ExpandProperty FullName

            if ($appxLayoutDir) {
              Write-Host "Layout dir: $appxLayoutDir"
              $appxPath = "$env:GITHUB_WORKSPACE\SaveBridge_1.0.0.0_x64.appx"
              & $makeappx pack /d "$appxLayoutDir" /p "$appxPath" /overwrite /nv
            } else {
              Write-Error "Could not find AppPackages layout directory"
              exit 1
            }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            echo "appx_path=$appxPath" >> $env:GITHUB_OUTPUT
          } else {
            echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            Write-Host "APPX path: $($appx.FullName)"
          }

      # Create self-signed cert (CN=Adoptsomekids matches Publisher in manifest)
      - name: Create signing certificate
        id: cert
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          $pfxPath = "$env:GITHUB_WORKSPACE\SaveBridge-Dev.pfx"
          $pwd = ConvertTo-SecureString -String "SaveBridgeDev" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          Write-Host "Cert thumbprint: $($cert.Thumbprint)"
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "cer_path=$cerPath"               >> $env:GITHUB_OUTPUT

      - name: Sign APPX
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          Write-Host "signtool: $signtool"
          Write-Host "APPX: ${{ steps.locate.outputs.appx_path }}"

          & $signtool sign /fd SHA256 /sha1 "${{ steps.cert.outputs.thumbprint }}" `
            "${{ steps.locate.outputs.appx_path }}"

          if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed"; exit $LASTEXITCODE }
          Write-Host "Signed OK"

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.locate.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
