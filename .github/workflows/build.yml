name: Build APPX (JavaScript UWP)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridgeJS/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JavaScript UWP — no MSBuild, no .NET, no NuGet needed.
      # Just pack the SaveBridgeJS folder directly with MakeAppx.
      - name: Find MakeAppx
        id: makeappx
        shell: powershell
        run: |
          $path = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" `
            | Where-Object { $_.FullName -like "*x64*" } `
            | Select-Object -First 1).FullName
          if (-not $path) { throw "MakeAppx.exe not found" }
          Write-Host "MakeAppx: $path"
          echo "path=$path" >> $env:GITHUB_OUTPUT

      - name: Pack JavaScript UWP APPX
        shell: powershell
        run: |
          $makeappx = "${{ steps.makeappx.outputs.path }}"
          $src      = "$env:GITHUB_WORKSPACE\SaveBridgeJS"
          $out      = "$env:GITHUB_WORKSPACE\SaveBridge_1.0.0.0_neutral.appx"

          Write-Host "Source: $src"
          Write-Host "Output: $out"
          Write-Host "Contents:"
          Get-ChildItem $src -Recurse | Select-Object FullName | Format-Table

          & $makeappx pack /d "$src" /p "$out" /overwrite /nv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $size = (Get-Item $out).Length
          Write-Host "APPX packed: $out ($size bytes)"
          echo "appx_path=$out" >> $env:GITHUB_OUTPUT
        id: pack

      - name: Create signing certificate
        id: cert
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          $pfxPath = "$env:GITHUB_WORKSPACE\SaveBridge-Dev.pfx"
          $pwd = ConvertTo-SecureString -String "SaveBridgeDev" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          Write-Host "Cert thumbprint: $($cert.Thumbprint)"
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "cer_path=$cerPath"               >> $env:GITHUB_OUTPUT

      - name: Sign APPX
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          & $signtool sign /fd SHA256 /sha1 "${{ steps.cert.outputs.thumbprint }}" `
            "${{ steps.pack.outputs.appx_path }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Signed OK"

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.pack.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pack.outputs.appx_path }}
            ${{ steps.cert.outputs.cer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
