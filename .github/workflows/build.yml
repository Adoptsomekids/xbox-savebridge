name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Restore NuGet packages
      - name: Restore
        shell: powershell
        run: |
          dotnet restore "SaveBridge\SaveBridge\SaveBridge.csproj" -r win10-x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Build self-contained packaged Win32 APPX (Windows.FullTrustApplication, runFullTrust)
      - name: Build APPX (x64, self-contained)
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find MSBuild\**\Bin\MSBuild.exe 2>$null
          if (-not $msbuild) { $msbuild = "msbuild" }
          Write-Host "Using MSBuild: $msbuild"

          & $msbuild "SaveBridge\SaveBridge\SaveBridge.csproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win10-x64 `
            /p:SelfContained=true `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x64" `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=false `
            /t:Build `
            /m `
            /v:normal

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "=== Build output ==="
          Get-ChildItem -Recurse -Include "*.appx","*.appxbundle","*.msix","*.msixbundle" | ForEach-Object { Write-Host $_.FullName }

      # Sign with a fresh self-signed dev cert (CN=Adoptsomekids, same as Package.appxmanifest Publisher)
      - name: Sign APPX bundle
        if: success()
        id: sign_appx
        shell: powershell
        run: |
          # Locate bundle
          $bundle = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1
          if (-not $bundle) { $bundle = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1 }
          if (-not $bundle) {
            Write-Host "No bundle found - listing APPX output:"
            Get-ChildItem -Recurse -Include "*.appx","*.msix"
            exit 0
          }
          Write-Host "Bundle to sign: $($bundle.FullName)"

          # Create self-signed cert matching Publisher = CN=Adoptsomekids
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          # Export public cert so the user can install it on Xbox
          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "Exported cert: $cerPath"

          # Sign
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          Write-Host "signtool: $signtool"
          & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint "$($bundle.FullName)"
          $exitCode = $LASTEXITCODE

          # Timestamp is optional - ignore failure
          if ($exitCode -ne 0) {
            Write-Host "Sign failed with $exitCode"
            exit $exitCode
          }

          echo "bundle_path=$($bundle.FullName)" >> $env:GITHUB_OUTPUT
          echo "bundle_name=$($bundle.Name)"     >> $env:GITHUB_OUTPUT

      - name: Find any APPX output (fallback)
        if: success() && steps.sign_appx.outputs.bundle_path == ''
        id: find_appx
        shell: powershell
        run: |
          $appx = Get-ChildItem -Recurse -Include "*.msixbundle","*.appxbundle","*.appx","*.msix" | Select-Object -First 1
          if ($appx) {
            echo "bundle_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            echo "bundle_name=$($appx.Name)"     >> $env:GITHUB_OUTPUT
          }

      # Resolve which path to upload (sign step wins; fallback step is second)
      - name: Set artifact path
        if: success()
        id: artifact_path
        shell: powershell
        run: |
          $p = "${{ steps.sign_appx.outputs.bundle_path }}"
          if (-not $p) { $p = "${{ steps.find_appx.outputs.bundle_path }}" }
          if ($p) {
            echo "path=$p" >> $env:GITHUB_OUTPUT
            Write-Host "Artifact path: $p"
          } else {
            Write-Host "No artifact path found - searching..."
            $f = Get-ChildItem -Recurse -Include "*.appxbundle","*.msixbundle","*.appx","*.msix" | Select-Object -First 1
            if ($f) {
              echo "path=$($f.FullName)" >> $env:GITHUB_OUTPUT
              Write-Host "Found: $($f.FullName)"
            }
          }

      - name: Upload APPX artifact
        if: success() && steps.artifact_path.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.artifact_path.outputs.path }}
            ${{ github.workspace }}\SaveBridge-DevCert.cer
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release' && steps.artifact_path.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact_path.outputs.path }}
            ${{ github.workspace }}\SaveBridge-DevCert.cer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
