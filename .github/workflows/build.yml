name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install UWP workload for Visual Studio
        shell: powershell
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstaller) {
            Write-Host "Installing UWP workload..."
            & $vsInstaller modify `
              --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
              --add Microsoft.VisualStudio.Workload.Universal `
              --quiet --norestart --force 2>&1
            Write-Host "UWP workload install exit code: $LASTEXITCODE"
          } else {
            Write-Host "VS Installer not found, listing directory..."
            Get-ChildItem "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\" -ErrorAction SilentlyContinue
          }

      - name: Verify UWP XAML targets exist
        shell: powershell
        continue-on-error: true
        run: |
          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Microsoft\WindowsXaml",
            "C:\Program Files (x86)\MSBuild\Microsoft\WindowsXaml"
          )
          $found = $false
          foreach ($root in $searchRoots) {
            if (Test-Path $root) {
              Write-Host "Found UWP XAML targets at: $root"
              Get-ChildItem $root | ForEach-Object { Write-Host $_.Name }
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "WindowsXaml targets not found in standard locations. Searching..."
            Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" -Recurse -Filter "Microsoft.Windows.UI.Xaml.CSharp.targets" -ErrorAction SilentlyContinue |
              Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
          }

      # No PackageReference: project uses no external NuGet packages.
      # System.Runtime and Windows SDK types are provided by the UWP platform SDK.
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Restore NuGet packages
        shell: powershell
        run: |
          Write-Host "No external packages to restore."
          Write-Host "UWP SDK types (System.Runtime, Windows.Gaming.XboxLive.Storage) come from the platform SDK."

      - name: Find System.Runtime path for XAML compiler
        shell: powershell
        id: find_sysruntime
        run: |
          # The XAML compiler (XamlCompiler/WMC1006) requires System.Runtime.dll
          # in its type universe. Find it on this runner.
          $candidates = @(
            "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5",
            "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5.1",
            "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\v4.0",
            "C:\Windows\Microsoft.NET\Framework64\v4.0.30319",
            "C:\Windows\Microsoft.NET\Framework\v4.0.30319"
          )
          $found = ""
          foreach ($dir in $candidates) {
            $dll = Join-Path $dir "System.Runtime.dll"
            if (Test-Path $dll) {
              Write-Host "Found System.Runtime.dll at: $dll"
              $found = $dir
              break
            }
          }
          if (-not $found) {
            Write-Host "System.Runtime.dll not found in standard locations, searching..."
            $dll = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "System.Runtime.dll" -ErrorAction SilentlyContinue |
              Where-Object { $_.DirectoryName -like "*Reference*" -or $_.DirectoryName -like "*NETCore*" } |
              Select-Object -First 1
            if ($dll) {
              Write-Host "Found at: $($dll.FullName)"
              $found = $dll.DirectoryName
            } else {
              Write-Host "System.Runtime.dll not found anywhere under Program Files (x86)"
            }
          }
          echo "sysruntime_dir=$found" >> $env:GITHUB_OUTPUT

      - name: Build APPX (ARM64)
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find MSBuild\**\Bin\MSBuild.exe
          if (-not $msbuild) { $msbuild = "msbuild" }
          Write-Host "Using MSBuild: $msbuild"

          $sysRuntimeDir = "${{ steps.find_sysruntime.outputs.sysruntime_dir }}"
          Write-Host "System.Runtime path: $sysRuntimeDir"

          & $msbuild SaveBridge/SaveBridge.sln `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="ARM64" `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=false `
            /p:AdditionalLibPaths="$sysRuntimeDir" `
            /t:Build `
            /m `
            /v:normal

          Write-Host "Build exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

      - name: Find and list APPX output
        if: success()
        shell: powershell
        id: find_appx
        run: |
          $appx = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1
          if ($appx) {
            Write-Host "Found: $($appx.FullName)"
            echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            echo "appx_name=$($appx.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No .appxbundle found, checking for .msixbundle..."
            $msix = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1
            if ($msix) {
              Write-Host "Found MSIX: $($msix.FullName)"
              echo "appx_path=$($msix.FullName)" >> $env:GITHUB_OUTPUT
              echo "appx_name=$($msix.Name)" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "Listing all build output..."
              Get-ChildItem -Recurse -Include "*.appx","*.appxbundle","*.msix","*.msixbundle","*.exe"
            }
          }

      - name: Upload APPX as artifact
        if: success() && steps.find_appx.outputs.appx_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: ${{ steps.find_appx.outputs.appx_path }}
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release' && steps.find_appx.outputs.appx_path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_appx.outputs.appx_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
