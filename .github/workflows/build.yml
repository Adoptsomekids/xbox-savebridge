name: Build APPX (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'SaveBridge/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      # Install Universal Windows Platform workload.
      - name: Install UWP workload
        shell: powershell
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstaller) {
            Write-Host "Installing UWP workload..."
            & $vsInstaller modify `
              --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
              --add Microsoft.VisualStudio.Workload.Universal `
              --quiet --norestart --force 2>&1
            Write-Host "UWP workload install exit code: $LASTEXITCODE"
          } else {
            Write-Host "VS Installer not found, assuming workload already present."
          }

      # NuGet restore pulls Microsoft.NETCore.UniversalWindowsPlatform 6.2.9.
      - name: NuGet Restore
        shell: powershell
        run: |
          nuget restore "SaveBridge\SaveBridge.sln" -Verbosity normal
          Write-Host "NuGet restore exit code: $LASTEXITCODE"

      # The NUP .props file is supposed to add BCL facade DLLs to ReferencePath,
      # but it only fires when TargetPlatformIdentifier=UAP is already resolved.
      # We work around this by explicitly injecting the BCL DLLs as <Reference>
      # items pointing to the local restored packages\ folder.
      #
      # We also delete the stale .NETCore,Version=v5.0.AssemblyAttributes.cs
      # from obj\ if it exists (generated by .NET SDK auto-detection, not UAP).
      - name: Inject BCL facades into csproj
        shell: powershell
        run: |
          $pkgBase = "$env:GITHUB_WORKSPACE\SaveBridge\packages"
          $nupDir  = "$pkgBase\Microsoft.NETCore.UniversalWindowsPlatform.6.2.9"
          $refDir  = "$nupDir\ref\uap10.0.15138"

          Write-Host "NUP dir: $nupDir  exists: $(Test-Path $nupDir)"
          Write-Host "ref dir: $refDir  exists: $(Test-Path $refDir)"

          if (-not (Test-Path $refDir)) {
            Write-Error "NUP ref dir not found. Listing packages\ folder:"
            Get-ChildItem $pkgBase -Recurse -Depth 2 | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }

          # Collect BCL facade DLLs — everything except duplicates and
          # System.Private.* which conflict with the public facade surface.
          $dlls = Get-ChildItem $refDir -Filter "*.dll" | Where-Object {
            $_.Name -notmatch "^System\.Private\." -and
            $_.Name -notmatch "^Microsoft\.VisualBasic"
          } | ForEach-Object { $_.FullName }

          Write-Host ("Found " + $dlls.Count + " BCL facade DLLs")

          # Build <Reference> items
          $items = ($dlls | ForEach-Object {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($_)
            "    <Reference Include=`"$name`"><HintPath>$_</HintPath><Private>false</Private></Reference>"
          }) -join "`n"
          $block = "  <ItemGroup Label=`"BCL-facades-injected`">`n$items`n  </ItemGroup>"

          $csproj = "$env:GITHUB_WORKSPACE\SaveBridge\SaveBridge\SaveBridge.csproj"
          $xml    = Get-Content $csproj -Raw

          # Remove any previous injection
          $xml = $xml -replace '(?s)  <ItemGroup Label="BCL-facades-injected">.*?</ItemGroup>\n', ''

          # Insert before the closing </Project>
          $xml = $xml -replace '</Project>', "$block`n</Project>"

          Set-Content $csproj $xml -Encoding UTF8
          Write-Host "Injected $($dlls.Count) BCL reference items into csproj"

      # Build the APPX. The /p:DisableXbfGeneration=true suppresses the XAML
      # compiler type-universe pass (WMC) so WMC1006 cannot fire.
      - name: Build APPX (ARM64)
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find MSBuild\**\Bin\MSBuild.exe
          if (-not $msbuild) { $msbuild = "msbuild" }
          Write-Host "Using MSBuild: $msbuild"

          & $msbuild "SaveBridge\SaveBridge.sln" `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="ARM64" `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=false `
            /p:DisableXbfGeneration=true `
            /p:CheckNuGetPackages=false `
            /t:Build `
            /m `
            /v:normal

          Write-Host "Build exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

      # Sign the APPX bundle with a self-signed developer certificate.
      # The Xbox requires a signed package; the cert must be installed on the
      # console before deploying. We upload the .cer file as a separate artifact.
      - name: Sign APPX bundle
        if: success()
        shell: powershell
        id: sign_appx
        run: |
          # Find the built msixbundle
          $bundle = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1
          if (-not $bundle) { $bundle = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1 }
          if (-not $bundle) { Write-Error "No bundle found"; exit 1 }
          Write-Host "Bundle: $($bundle.FullName)"

          # Generate self-signed code-signing certificate (EKU 1.3.6.1.5.5.7.3.3)
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Adoptsomekids" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SaveBridge Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"

          # Export .cer (public key only) for installation on Xbox
          $cerPath = "$env:GITHUB_WORKSPACE\SaveBridge-DevCert.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "Exported cert: $cerPath"

          # Sign the bundle using signtool
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe"
          if (-not (Test-Path $signtool)) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1 | ForEach-Object { $_.FullName }
          }
          Write-Host "Using signtool: $signtool"

          & $signtool sign `
            /fd SHA256 `
            /sha1 $cert.Thumbprint `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            "$($bundle.FullName)"

          Write-Host "signtool exit: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Timestamp may have failed, retrying without timestamp..."
            & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint "$($bundle.FullName)"
            Write-Host "signtool exit (no ts): $LASTEXITCODE"
          }
          exit 0

      - name: Find APPX output
        if: success()
        shell: powershell
        id: find_appx
        run: |
          $appx = Get-ChildItem -Recurse -Filter "*.appxbundle" | Select-Object -First 1
          if (-not $appx) { $appx = Get-ChildItem -Recurse -Filter "*.msixbundle" | Select-Object -First 1 }
          if ($appx) {
            Write-Host "Found: $($appx.FullName)"
            echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT
            echo "appx_name=$($appx.Name)"     >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No bundle found. Available outputs:"
            Get-ChildItem -Recurse -Include "*.appx","*.appxbundle","*.msix","*.msixbundle"
          }

      - name: Upload APPX + certificate artifacts
        if: success() && steps.find_appx.outputs.appx_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SaveBridge-APPX
          path: |
            ${{ steps.find_appx.outputs.appx_path }}
            ${{ github.workspace }}/SaveBridge-DevCert.cer
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release' && steps.find_appx.outputs.appx_path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_appx.outputs.appx_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
